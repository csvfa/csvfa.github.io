<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hutchinson Product Consulting</title>
    <style>
      :root {
        --bg-top: #0f172a;
        --bg-bottom: #111827;
        --glow-a: #38bdf8;
        --glow-b: #22d3ee;
        --text: #f8fafc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "Avenir Next", "Segoe UI", sans-serif;
        color: var(--text);
        background: radial-gradient(circle at 20% 20%, #1e293b 0%, transparent 45%),
          radial-gradient(circle at 80% 75%, #0e7490 0%, transparent 35%),
          linear-gradient(160deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
        overflow: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 50%;
        filter: blur(70px);
        z-index: -1;
        opacity: 0.4;
        animation: drift 12s ease-in-out infinite alternate;
      }

      body::before {
        width: 320px;
        height: 320px;
        background: var(--glow-a);
        top: -80px;
        left: -50px;
      }

      body::after {
        width: 280px;
        height: 280px;
        background: var(--glow-b);
        bottom: -70px;
        right: -40px;
        animation-duration: 15s;
      }

      h1 {
        margin: 0;
        padding: 1.4rem 2rem;
        text-align: center;
        font-size: clamp(2rem, 5vw, 4rem);
        letter-spacing: 0.04em;
        font-weight: 650;
        text-shadow: 0 8px 30px rgba(0, 0, 0, 0.35);
        background: linear-gradient(120deg, #f8fafc 0%, #bae6fd 45%, #ccfbf1 100%);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: reveal 1s ease-out both;
      }

      @keyframes drift {
        from {
          transform: translate(-10px, -10px) scale(1);
        }
        to {
          transform: translate(15px, 15px) scale(1.08);
        }
      }

      @keyframes reveal {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
    </style>
  </head>
  <body>
    <h1>Hutchinson Product Consulting</h1>
  </body>
</html>
